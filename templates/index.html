<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LiveChat — Groupe</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.7.2/socket.io.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;800&display=swap" rel="stylesheet">

<style>
:root {
  --bg:#0c0c0f;
  --surface:#13131a;
  --surface2:#1a1a24;
  --border:#2a2a38;
  --accent:#7c6dfa;
  --accent2:#fa6d9b;
  --text:#e8e8f0;
  --text-dim:#8b8ba5;
  --text-muted:#3a3a50;
  --green:#4ade80;
  --danger:#ff5f7e;
  --radius:12px;
  --chat-width:860px;
}

* {
  box-sizing:border-box;
  margin:0;
  padding:0;
}

body {
  background:var(--bg);
  color:var(--text);
  font-family:'Syne',sans-serif;
  height:100dvh;
  overflow:hidden;
}

body::before {
  content:'';
  position:fixed;
  inset:0;
  background-image:
    linear-gradient(var(--text-muted) 1px,transparent 1px),
    linear-gradient(90deg,var(--text-muted) 1px,transparent 1px);
  background-size:48px 48px;
  opacity:.12;
  pointer-events:none;
}

/* ── MODAL ── */
#modal-overlay {
  position:fixed;
  inset:0;
  background:rgba(12,12,15,.92);
  backdrop-filter:blur(12px);
  display:flex;
  align-items:center;
  justify-content:center;
  z-index:100;
  transition:opacity .4s;
}

#modal-overlay.hidden {
  opacity:0;
  pointer-events:none;
}

#modal {
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:20px;
  padding:48px 40px;
  width:min(420px,90vw);
  text-align:center;
  animation:modalIn .5s cubic-bezier(.34,1.56,.64,1) both;
  position:relative;
  overflow:hidden;
}

#modal::before {
  content:'';
  position:absolute;
  top:-80px;
  left:50%;
  transform:translateX(-50%);
  width:200px;
  height:200px;
  background:radial-gradient(circle,rgba(124,109,250,.25) 0%,transparent 70%);
  pointer-events:none;
}

@keyframes modalIn {
  from {
    opacity:0;
    transform:scale(.85) translateY(20px);
  }
  to {
    opacity:1;
    transform:scale(1) translateY(0);
  }
}

#modal .icon {
  font-size:40px;
  margin-bottom:20px;
  display:block;
}

#modal h2 {
  font-size:24px;
  font-weight:800;
  margin-bottom:8px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
}

#modal p {
  color:var(--text-dim);
  font-size:14px;
  margin-bottom:28px;
  font-family:'DM Mono',monospace;
}

.modal-input {
  width:100%;
  background:var(--surface2);
  border:1.5px solid var(--border);
  border-radius:var(--radius);
  padding:14px 18px;
  font-family:'Syne',sans-serif;
  font-size:16px;
  font-weight:600;
  color:var(--text);
  outline:none;
  text-align:center;
  transition:border-color .2s;
  margin-bottom:12px;
  display:block;
}

.modal-input:focus {
  border-color:var(--accent);
}

.modal-input::placeholder {
  color:var(--text-muted);
}

#auth-error {
  display:none;
  color:var(--accent2);
  font-family:'DM Mono',monospace;
  font-size:13px;
  margin-bottom:10px;
}

#join-btn {
  width:100%;
  padding:14px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;
  border-radius:var(--radius);
  color:#fff;
  font-family:'Syne',sans-serif;
  font-size:16px;
  font-weight:700;
  cursor:pointer;
  transition:opacity .2s,transform .15s;
  letter-spacing:.5px;
  margin-top:4px;
}

#join-btn:hover {
  opacity:.9;
  transform:translateY(-1px);
}

#join-btn:active {
  transform:translateY(0);
}

/* ── APP LAYOUT ── */
#app {
  width:100%;
  max-width:none;
  height:100dvh;
  display:flex;
  flex-direction:column;
  position:relative;
  background:rgba(12,12,15,.72);
}

/* ── HEADER ── */
header {
  display:flex;
  align-items:flex-start;
  justify-content:space-between;
  gap:18px;

  padding-top:18px;
  padding-bottom:18px;
  padding-left:max(24px, calc((100vw - var(--chat-width)) / 2));
  padding-right:max(24px, calc((100vw - var(--chat-width)) / 2));

  width:100%;
  border-bottom:1px solid var(--border);
  background:rgba(19,19,26,.96);
  backdrop-filter:blur(10px);
  flex-shrink:0;
  position:relative;
  z-index:5;
}

.header-left {
  display:flex;
  align-items:center;
  gap:12px;
  min-width:max-content;
}

.logo {
  width:36px;
  height:36px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border-radius:10px;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:18px;
  box-shadow:0 10px 30px rgba(124,109,250,.25);
}

header h1 {
  font-size:18px;
  font-weight:800;
  letter-spacing:-.5px;
  line-height:1;
}

header h1 span {
  color:var(--accent);
}

.header-right {
  display:flex;
  flex-direction:column;
  align-items:flex-end;
  gap:8px;
  min-width:0;
  max-width:62vw;
}

.status-bar {
  display:flex;
  align-items:center;
  gap:8px;
  font-family:'DM Mono',monospace;
  font-size:12px;
  color:var(--text-dim);
  white-space:nowrap;
}

.dot {
  width:7px;
  height:7px;
  border-radius:50%;
  background:var(--green);
  box-shadow:0 0 8px var(--green);
  animation:pulse 2s infinite;
}

@keyframes pulse {
  0%,100% {
    opacity:1;
  }
  50% {
    opacity:.4;
  }
}

#online-count {
  color:var(--text);
  font-weight:600;
}

/* utilisateurs connectés en haut à droite */
#users-strip {
  display:flex;
  justify-content:flex-end;
  gap:6px;
  flex-wrap:nowrap;
  overflow-x:auto;
  max-width:100%;
  padding-bottom:2px;
  scrollbar-width:none;
}

#users-strip::-webkit-scrollbar {
  display:none;
}

.user-chip {
  display:flex;
  align-items:center;
  gap:6px;
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:999px;
  padding:3px 10px 3px 4px;
  font-size:12px;
  font-family:'DM Mono',monospace;
  animation:chipIn .3s cubic-bezier(.34,1.56,.64,1);
  white-space:nowrap;
  flex-shrink:0;
}

@keyframes chipIn {
  from {
    opacity:0;
    transform:scale(.7);
  }
  to {
    opacity:1;
    transform:scale(1);
  }
}

.chip-av {
  width:20px;
  height:20px;
  border-radius:50%;
  display:flex;
  align-items:center;
  justify-content:center;
  font-size:10px;
  font-weight:700;
  flex-shrink:0;
}

/* ── MESSAGES ── */
#messages {
  flex:1;
  overflow-y:auto;

  padding-top:28px;
  padding-bottom:14px;
  padding-left:max(24px, calc((100vw - var(--chat-width)) / 2));
  padding-right:max(24px, calc((100vw - var(--chat-width)) / 2));

  display:flex;
  flex-direction:column;
  gap:6px;
  scroll-behavior:smooth;

  scrollbar-width:thin;
  scrollbar-color:transparent transparent;
}

#messages:hover,
#messages.is-scrolling {
  scrollbar-color:rgba(124,109,250,.55) transparent;
}

#messages::-webkit-scrollbar {
  width:5px;
}

#messages::-webkit-scrollbar-track {
  background:transparent;
}

#messages::-webkit-scrollbar-thumb {
  background:transparent;
  border-radius:999px;
}

#messages:hover::-webkit-scrollbar-thumb,
#messages.is-scrolling::-webkit-scrollbar-thumb {
  background:rgba(124,109,250,.55);
}

#messages::-webkit-scrollbar-thumb:hover {
  background:rgba(124,109,250,.85);
}

.msg {
  display:flex;
  flex-direction:column;
  max-width:82%;
  animation:msgIn .22s cubic-bezier(.34,1.56,.64,1) both;
}

@keyframes msgIn {
  from {
    opacity:0;
    transform:translateY(8px) scale(.97);
  }
  to {
    opacity:1;
    transform:none;
  }
}

.msg.mine {
  align-self:flex-end;
  align-items:flex-end;
}

.msg.theirs {
  align-self:flex-start;
  align-items:flex-start;
}

.msg-meta {
  display:flex;
  align-items:center;
  gap:7px;
  margin-bottom:4px;
  font-family:'DM Mono',monospace;
  font-size:11px;
  color:var(--text-dim);
  max-width:100%;
  flex-wrap:wrap;
}

.msg.mine .msg-meta {
  flex-direction:row-reverse;
}

.msg-name {
  font-weight:500;
}

.msg-edited {
  opacity:.7;
  font-size:10px;
}

.msg-content {
  display:flex;
  flex-direction:column;
  max-width:100%;
}

.msg.mine .msg-content {
  align-items:flex-end;
}

.msg.theirs .msg-content {
  align-items:flex-start;
}

.msg-bubble {
  padding:10px 14px;
  border-radius:18px;
  font-size:15px;
  line-height:1.55;
  word-break:break-word;
  overflow-wrap:anywhere;
  max-width:100%;
}

.msg.mine .msg-bubble {
  background:linear-gradient(135deg,var(--accent),#9d8ffa);
  color:#fff;
  border-bottom-right-radius:4px;
}

.msg.theirs .msg-bubble {
  background:var(--surface2);
  border:1px solid var(--border);
  color:var(--text);
  border-bottom-left-radius:4px;
}

.msg-bubble.long-collapsed {
  max-height:230px;
  overflow:hidden;
  position:relative;
}

.msg-bubble.long-collapsed::after {
  content:'';
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:54px;
  pointer-events:none;
}

.msg.theirs .msg-bubble.long-collapsed::after {
  background:linear-gradient(to bottom, transparent, var(--surface2));
}

.msg.mine .msg-bubble.long-collapsed::after {
  background:linear-gradient(to bottom, transparent, rgba(124,109,250,.98));
}

.toggle-long-btn {
  margin-top:5px;
  border:none;
  background:transparent;
  color:var(--accent);
  font-family:'DM Mono',monospace;
  font-size:11px;
  cursor:pointer;
  opacity:.9;
  padding:2px 3px;
}

.msg.mine .toggle-long-btn {
  color:#fff;
  opacity:.85;
}

.toggle-long-btn:hover {
  text-decoration:underline;
}

/* actions modifier / supprimer */
.msg-actions {
  display:flex;
  align-items:center;
  gap:4px;
}

.msg-action {
  border:1px solid var(--border);
  background:var(--surface2);
  color:var(--text-dim);
  font-family:'DM Mono',monospace;
  font-size:10px;
  border-radius:999px;
  padding:2px 7px;
  cursor:pointer;
  transition:background .15s,color .15s,border-color .15s,transform .1s;
}

.msg-action:hover {
  background:var(--border);
  color:var(--text);
  transform:translateY(-1px);
}

.msg-action.delete {
  color:var(--danger);
  border-color:rgba(255,95,126,.35);
}

.msg-action.delete:hover {
  background:rgba(255,95,126,.12);
}

/* markdown */
.msg-bubble p {
  margin:0 0 6px;
}

.msg-bubble p:last-child {
  margin-bottom:0;
}

.msg-bubble code {
  background:rgba(0,0,0,.25);
  padding:1px 5px;
  border-radius:4px;
  font-family:'DM Mono',monospace;
  font-size:13px;
}

.msg.mine .msg-bubble code {
  background:rgba(0,0,0,.2);
}

.msg-bubble pre {
  background:rgba(0,0,0,.3);
  border-radius:8px;
  padding:10px 12px;
  overflow-x:auto;
  margin:6px 0;
  max-width:100%;
}

.msg-bubble pre code {
  background:none;
  padding:0;
}

.msg-bubble strong {
  font-weight:700;
}

.msg-bubble em {
  font-style:italic;
}

.msg-bubble ul,
.msg-bubble ol {
  padding-left:18px;
  margin:4px 0;
}

.msg-bubble blockquote {
  border-left:3px solid rgba(255,255,255,.3);
  padding-left:10px;
  margin:4px 0;
  opacity:.8;
}

.msg-bubble a {
  color:inherit;
  text-decoration:underline;
  opacity:.85;
}

/* ── FILE BUBBLE ── */
.file-bubble {
  display:flex;
  align-items:center;
  gap:12px;
  padding:10px 14px;
  border-radius:18px;
  cursor:pointer;
  text-decoration:none;
  transition:opacity .15s,transform .1s;
  max-width:100%;
}

.file-bubble:hover {
  opacity:.85;
  transform:scale(1.01);
}

.msg.mine .file-bubble {
  background:linear-gradient(135deg,var(--accent),#9d8ffa);
  color:#fff;
  border-bottom-right-radius:4px;
}

.msg.theirs .file-bubble {
  background:var(--surface2);
  border:1px solid var(--border);
  color:var(--text);
  border-bottom-left-radius:4px;
}

.file-icon {
  font-size:28px;
  flex-shrink:0;
}

.file-info {
  display:flex;
  flex-direction:column;
  gap:2px;
  min-width:0;
}

.file-name {
  font-weight:700;
  font-size:14px;
  white-space:nowrap;
  overflow:hidden;
  text-overflow:ellipsis;
  max-width:min(260px,60vw);
}

.file-meta {
  font-family:'DM Mono',monospace;
  font-size:11px;
  opacity:.7;
}

.img-bubble {
  max-width:min(340px,72vw);
  border-radius:14px;
  overflow:hidden;
  cursor:pointer;
}

.img-bubble img {
  width:100%;
  display:block;
}

/* system */
.msg-system {
  align-self:center;
  font-family:'DM Mono',monospace;
  font-size:11px;
  color:var(--text-muted);
  padding:3px 12px;
  background:var(--surface2);
  border-radius:999px;
  border:1px solid var(--border);
  animation:msgIn .25s both;
  margin:6px 0;
  text-align:center;
}

.date-sep {
  align-self:center;
  font-family:'DM Mono',monospace;
  font-size:10px;
  color:var(--text-muted);
  margin:12px 0 4px;
  text-transform:uppercase;
  letter-spacing:1px;
}

/* ── TYPING BAR ── */
#typing-bar {
  min-height:24px;

  padding-top:2px;
  padding-bottom:4px;
  padding-left:max(24px, calc((100vw - var(--chat-width)) / 2));
  padding-right:max(24px, calc((100vw - var(--chat-width)) / 2));

  font-family:'DM Mono',monospace;
  font-size:12px;
  color:var(--text-dim);
  flex-shrink:0;
  display:flex;
  align-items:center;
  gap:6px;
}

.typing-dots {
  display:inline-flex;
  gap:3px;
  align-items:center;
}

.typing-dots span {
  width:5px;
  height:5px;
  border-radius:50%;
  background:var(--accent);
  animation:bounce 1.2s infinite;
}

.typing-dots span:nth-child(2) {
  animation-delay:.2s;
}

.typing-dots span:nth-child(3) {
  animation-delay:.4s;
}

@keyframes bounce {
  0%,60%,100% {
    transform:translateY(0);
  }
  30% {
    transform:translateY(-5px);
  }
}

/* ── INPUT AREA STYLE CHATGPT ── */
#input-shell {
  width:100%;
  flex-shrink:0;
  position:relative;
  z-index:5;
  padding:0 0 1px;
  background:linear-gradient(
    to top,
    rgba(12,12,15,.98) 0%,
    rgba(12,12,15,.92) 62%,
    rgba(12,12,15,0) 100%
  );
}

#input-area {
  width:min(var(--chat-width), calc(100vw - 48px));
  margin:10px auto 18px;
  padding:12px;

  border:1px solid rgba(124,109,250,.28);
  background:rgba(19,19,26,.96);
  backdrop-filter:blur(12px);
  border-radius:24px;

  display:flex;
  gap:10px;
  align-items:flex-end;

  box-shadow:
    0 16px 50px rgba(0,0,0,.28),
    0 0 0 1px rgba(255,255,255,.02);

  transition:border-color .18s, box-shadow .18s, transform .18s;
}

#input-area:focus-within {
  border-color:rgba(124,109,250,.75);
  box-shadow:
    0 18px 60px rgba(0,0,0,.35),
    0 0 0 3px rgba(124,109,250,.10);
}

#input-wrap {
  flex:1;
  display:flex;
  flex-direction:column;
  gap:6px;
  min-width:0;
}

#md-toolbar {
  display:flex;
  gap:4px;
  flex-wrap:wrap;
  padding:0 4px;
}

.md-btn {
  background:var(--surface2);
  border:1px solid var(--border);
  border-radius:8px;
  padding:3px 8px;
  color:var(--text-dim);
  font-family:'DM Mono',monospace;
  font-size:12px;
  cursor:pointer;
  transition:background .15s,color .15s,border-color .15s;
  line-height:1.4;
}

.md-btn:hover {
  background:var(--border);
  color:var(--text);
  border-color:rgba(124,109,250,.45);
}

#msg-input {
  width:100%;
  background:transparent;
  border:none;
  border-radius:16px;
  padding:8px 6px 7px;
  font-family:'Syne',sans-serif;
  font-size:15px;
  color:var(--text);
  outline:none;
  resize:none;
  max-height:220px;
  overflow-y:auto;
  line-height:1.5;
}

#msg-input::placeholder {
  color:var(--text-muted);
}

#upload-btn {
  width:42px;
  height:42px;
  background:var(--surface2);
  border:1.5px solid var(--border);
  border-radius:16px;
  color:var(--text-dim);
  font-size:20px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  align-self:flex-end;
  transition:background .15s,color .15s,transform .1s,border-color .15s;
}

#upload-btn:hover {
  background:var(--border);
  color:var(--text);
  transform:scale(1.04);
  border-color:rgba(124,109,250,.45);
}

#file-input {
  display:none;
}

#upload-progress {
  position:fixed;
  bottom:92px;
  right:24px;
  background:var(--surface);
  border:1px solid var(--accent);
  border-radius:12px;
  padding:10px 16px;
  font-family:'DM Mono',monospace;
  font-size:13px;
  color:var(--accent);
  display:none;
  z-index:50;
  animation:msgIn .2s both;
  max-width:min(420px,90vw);
}

#send-btn {
  width:42px;
  height:42px;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  border:none;
  border-radius:16px;
  color:#fff;
  font-size:20px;
  cursor:pointer;
  display:flex;
  align-items:center;
  justify-content:center;
  flex-shrink:0;
  align-self:flex-end;
  transition:opacity .2s,transform .15s;
  box-shadow:0 10px 30px rgba(124,109,250,.22);
}

#send-btn:hover {
  opacity:.88;
  transform:scale(1.05);
}

#send-btn:active {
  transform:scale(.94);
}

/* on cache le label pour que l'input reste parfaitement centré */
#my-name-tag {
  display:none;
}

/* ── IMAGE LIGHTBOX ── */
#lightbox {
  position:fixed;
  inset:0;
  background:rgba(0,0,0,.85);
  align-items:center;
  justify-content:center;
  z-index:200;
  cursor:zoom-out;
  display:none;
}

#lightbox img {
  max-width:90vw;
  max-height:90vh;
  border-radius:10px;
  box-shadow:0 20px 60px rgba(0,0,0,.5);
}

/* ── RESPONSIVE ── */
@media (max-width:720px) {
  header {
    padding:14px 18px;
    align-items:flex-start;
  }

  .header-right {
    max-width:58vw;
  }

  .msg {
    max-width:92%;
  }

  #messages {
    padding:20px 18px 10px;
  }

  #typing-bar {
    padding-left:18px;
    padding-right:18px;
  }

  #input-area {
    width:calc(100vw - 24px);
    margin:8px auto 12px;
    padding:10px;
    border-radius:22px;
  }

  #md-toolbar {
    display:none;
  }

  #msg-input {
    padding:8px 4px;
  }

  #upload-btn,
  #send-btn {
    width:40px;
    height:40px;
    border-radius:14px;
  }

  #upload-progress {
    right:16px;
    bottom:80px;
  }
}
</style>
</head>

<body>

<!-- ── MODAL ── -->
<div id="modal-overlay">
  <div id="modal">
    <span class="icon">💬</span>
    <h2>Rejoindre le groupe</h2>
    <p>Entrez votre nom et le mot de passe</p>

    <input
      id="name-input"
      class="modal-input"
      type="text"
      placeholder="Votre prénom…"
      autocomplete="off"
      autofocus
    >

    <input
      id="password-input"
      class="modal-input"
      type="password"
      placeholder="Mot de passe…"
      maxlength="32"
      autocomplete="off"
    >

    <div id="auth-error"></div>

    <button id="join-btn">Entrer dans le groupe →</button>
  </div>
</div>

<!-- ── APP ── -->
<div id="app">
  <header>
    <div class="header-left">
      <div class="logo">💬</div>
      <h1>Live<span>Chat</span></h1>
    </div>

    <div class="header-right">
      <div class="status-bar">
        <div class="dot"></div>
        <span><span id="online-count">0</span> en ligne</span>
      </div>

      <div id="users-strip"></div>
    </div>
  </header>

  <div id="messages">
    <div class="msg-system">👋 Bienvenue — messages persistants · Markdown · Fichiers · Sans limite de texte</div>
  </div>

  <div id="typing-bar"></div>

  <div id="input-shell">
    <div id="input-area">
      <span id="my-name-tag">vous : <strong id="my-name-label">—</strong></span>

      <div id="input-wrap">
        <div id="md-toolbar">
          <button class="md-btn" data-wrap="**" title="Gras">𝐁</button>
          <button class="md-btn" data-wrap="*" title="Italique">𝘐</button>
          <button class="md-btn" data-wrap="`" title="Code">``</button>
          <button class="md-btn" data-prefix="- " title="Liste">≡</button>
          <button class="md-btn" data-prefix="> " title="Citation">❝</button>
        </div>

        <textarea
          id="msg-input"
          rows="1"
          placeholder="Écrire un message… sans limite de texte · Shift+Entrée = saut de ligne"
        ></textarea>
      </div>

      <button id="upload-btn" title="Envoyer un fichier">📎</button>
      <input id="file-input" type="file">
      <button id="send-btn">↑</button>
    </div>
  </div>
</div>

<div id="upload-progress">⬆ Envoi en cours…</div>

<div id="lightbox">
  <img id="lightbox-img" src="" alt="">
</div>

<script>
// ── MARKED CONFIG ──
marked.setOptions({
  breaks: true,
  gfm: true
});

function escHtml(s) {
  return String(s || "")
    .replace(/&/g,"&amp;")
    .replace(/</g,"&lt;")
    .replace(/>/g,"&gt;")
    .replace(/"/g,"&quot;")
    .replace(/'/g,"&#039;");
}

function safeMarkdown(text) {
  return marked.parse(escHtml(text || ""));
}

// ── SESSION ──
const SESSION_KEY = "livechat_session";

function saveSession(name, password) {
  try {
    localStorage.setItem(SESSION_KEY, JSON.stringify({ name, password }));
  } catch(e) {}
}

function loadSession() {
  try {
    return JSON.parse(localStorage.getItem(SESSION_KEY) || "null");
  } catch(e) {
    return null;
  }
}

function clearSession() {
  try {
    localStorage.removeItem(SESSION_KEY);
  } catch(e) {}
}

// ── SOCKET ──
const socket = io();
let myUsername = "";
let myPassword = "";
let isTyping = false;
let typingTimer = null;

const messageStore = new Map();

// ── COLORS ──
const PALETTE = [
  ["#7c6dfa","#fff"],
  ["#fa6d9b","#fff"],
  ["#4ade80","#000"],
  ["#facc15","#000"],
  ["#60a5fa","#000"],
  ["#f97316","#fff"],
  ["#a78bfa","#fff"],
  ["#34d399","#000"],
  ["#fb923c","#fff"],
];

const userColors = {};
let colorIdx = 0;

function getColor(name) {
  if (!userColors[name]) {
    userColors[name] = PALETTE[colorIdx++ % PALETTE.length];
  }

  return userColors[name];
}

// ── JOIN ──
function doJoin(name, password) {
  myUsername = name;
  myPassword = password;
  socket.emit("join", { username: name, password });
}

function joinChat() {
  const nameInput = document.getElementById("name-input");
  const passInput = document.getElementById("password-input");
  const err = document.getElementById("auth-error");

  const name = nameInput.value.trim();
  const pass = passInput.value.trim();

  err.style.display = "none";

  if (!name) {
    nameInput.style.borderColor = "var(--accent2)";
    nameInput.focus();
    return;
  }

  if (!pass) {
    passInput.style.borderColor = "var(--accent2)";
    passInput.focus();
    return;
  }

  doJoin(name, pass);
}

document.getElementById("join-btn").addEventListener("click", joinChat);

document.getElementById("name-input").addEventListener("keydown", e => {
  if (e.key === "Enter") {
    document.getElementById("password-input").focus();
  }
});

document.getElementById("password-input").addEventListener("keydown", e => {
  if (e.key === "Enter") {
    joinChat();
  }
});

socket.on("connect", () => {
  const session = loadSession();

  if (session && session.name && session.password) {
    myUsername = session.name;
    myPassword = session.password;

    socket.emit("join", {
      username: session.name,
      password: session.password
    });
  }
});

// ── SEND TEXT ──
function sendMessage() {
  const ta = document.getElementById("msg-input");
  const text = ta.value;

  if (!text.trim() || !myUsername) {
    return;
  }

  socket.emit("message", { text });

  ta.value = "";
  ta.style.height = "auto";

  socket.emit("typing", { typing: false });
  clearTimeout(typingTimer);
  isTyping = false;
}

document.getElementById("send-btn").addEventListener("click", sendMessage);

document.getElementById("msg-input").addEventListener("keydown", e => {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

// ── AUTO-RESIZE TEXTAREA ──
document.getElementById("msg-input").addEventListener("input", function() {
  this.style.height = "auto";
  this.style.height = Math.min(this.scrollHeight, 220) + "px";
  handleTyping();
});

// ── TYPING ──
function handleTyping() {
  if (!myUsername) {
    return;
  }

  if (!isTyping) {
    isTyping = true;
    socket.emit("typing", { typing: true });
  }

  clearTimeout(typingTimer);

  typingTimer = setTimeout(() => {
    isTyping = false;
    socket.emit("typing", { typing: false });
  }, 2000);
}

// ── MARKDOWN TOOLBAR ──
document.querySelectorAll(".md-btn").forEach(btn => {
  btn.addEventListener("click", () => {
    const ta = document.getElementById("msg-input");
    const wrap = btn.dataset.wrap;
    const prefix = btn.dataset.prefix;

    const s = ta.selectionStart;
    const e2 = ta.selectionEnd;
    const sel = ta.value.substring(s, e2);

    if (wrap) {
      ta.value = ta.value.substring(0, s) + wrap + sel + wrap + ta.value.substring(e2);
      ta.setSelectionRange(s + wrap.length, e2 + wrap.length);
    }

    if (prefix) {
      ta.value = ta.value.substring(0, s) + prefix + sel + ta.value.substring(e2);
      ta.setSelectionRange(s + prefix.length, e2 + prefix.length);
    }

    ta.focus();

    ta.style.height = "auto";
    ta.style.height = Math.min(ta.scrollHeight, 220) + "px";
  });
});

// ── FILE UPLOAD ──
document.getElementById("upload-btn").addEventListener("click", () => {
  if (!myUsername) {
    return;
  }

  document.getElementById("file-input").click();
});

document.getElementById("file-input").addEventListener("change", function() {
  const file = this.files[0];

  if (!file) {
    return;
  }

  this.value = "";
  uploadFile(file);
});

// ── DRAG & DROP ──
const chatEl = document.getElementById("messages");

chatEl.addEventListener("dragover", e => {
  e.preventDefault();
  chatEl.style.outline = "2px dashed var(--accent)";
});

chatEl.addEventListener("dragleave", () => {
  chatEl.style.outline = "";
});

chatEl.addEventListener("drop", e => {
  e.preventDefault();
  chatEl.style.outline = "";

  if (!myUsername) {
    return;
  }

  const files = [...e.dataTransfer.files];

  files.forEach(file => uploadFile(file));
});

function uploadFile(file) {
  const prog = document.getElementById("upload-progress");

  prog.textContent = `⬆ Préparation de "${file.name}"…`;
  prog.style.display = "block";

  const fd = new FormData();
  fd.append("file", file);

  const xhr = new XMLHttpRequest();

  xhr.open("POST", "/upload", true);
  xhr.setRequestHeader("X-Username", myUsername);
  xhr.setRequestHeader("X-Password", myPassword);

  xhr.upload.onprogress = event => {
    if (event.lengthComputable) {
      const percent = Math.round((event.loaded / event.total) * 100);
      prog.textContent = `⬆ Envoi de "${file.name}"… ${percent}%`;
    } else {
      prog.textContent = `⬆ Envoi de "${file.name}"…`;
    }
  };

  xhr.onload = () => {
    prog.style.display = "none";

    if (xhr.status < 200 || xhr.status >= 300) {
      renderSystem("❌ Erreur upload : fichier non envoyé.");
    }
  };

  xhr.onerror = () => {
    prog.style.display = "none";
    renderSystem("❌ Erreur upload : connexion interrompue.");
  };

  xhr.send(fd);
}

// ── HELPERS ──
function formatSize(bytes) {
  if (!bytes) {
    return "";
  }

  if (bytes < 1024) {
    return bytes + " o";
  }

  if (bytes < 1024 * 1024) {
    return (bytes / 1024).toFixed(1) + " Ko";
  }

  if (bytes < 1024 * 1024 * 1024) {
    return (bytes / (1024 * 1024)).toFixed(1) + " Mo";
  }

  return (bytes / (1024 * 1024 * 1024)).toFixed(2) + " Go";
}

const IMAGE_EXTS = ["jpg","jpeg","png","gif","webp","svg","bmp"];

function isImage(filename) {
  const ext = (filename || "").split(".").pop().toLowerCase();
  return IMAGE_EXTS.includes(ext);
}

function fileIcon(filename) {
  const ext = (filename || "").split(".").pop().toLowerCase();

  const map = {
    pdf:"📄",
    doc:"📝",
    docx:"📝",
    xls:"📊",
    xlsx:"📊",
    ppt:"📽",
    pptx:"📽",
    zip:"🗜",
    rar:"🗜",
    "7z":"🗜",
    mp3:"🎵",
    wav:"🎵",
    ogg:"🎵",
    mp4:"🎬",
    mkv:"🎬",
    avi:"🎬",
    py:"🐍",
    js:"📜",
    html:"🌐",
    css:"🎨",
    txt:"📃",
    md:"📃",
    sh:"⚙",
    exe:"⚙",
    apk:"📱",
  };

  return map[ext] || "📁";
}

function shouldCollapseText(text) {
  const lines = String(text || "").split("\n").length;
  return String(text || "").length > 900 || lines > 12;
}

function getMessageNode(id) {
  return document.querySelector(`.msg[data-id="${String(id)}"]`);
}

// ── RENDER MESSAGE ──
function renderMessage(msg, toBottom = true) {
  const container = document.getElementById("messages");

  if (!msg || msg.id === undefined || msg.id === null) {
    return;
  }

  const id = String(msg.id);

  if (getMessageNode(id)) {
    return;
  }

  messageStore.set(id, msg);

  const isMine = msg.username === myUsername;
  const [bg, fg] = getColor(msg.username);

  const div = document.createElement("div");
  div.className = `msg ${isMine ? "mine" : "theirs"}`;
  div.dataset.id = id;

  const meta = document.createElement("div");
  meta.className = "msg-meta";

  const avatar = document.createElement("div");
  avatar.className = "chip-av";
  avatar.style.background = bg;
  avatar.style.color = fg;
  avatar.textContent = (msg.username || "?")[0].toUpperCase();

  const name = document.createElement("span");
  name.className = "msg-name";
  name.style.color = bg;
  name.textContent = isMine ? "Vous" : msg.username;

  const time = document.createElement("span");
  time.textContent = msg.time || "";

  meta.appendChild(avatar);
  meta.appendChild(name);
  meta.appendChild(time);

  if (msg.updated_at) {
    const edited = document.createElement("span");
    edited.className = "msg-edited";
    edited.textContent = "modifié";
    meta.appendChild(edited);
  }

  if (isMine) {
    const actions = document.createElement("div");
    actions.className = "msg-actions";

    if (msg.msg_type === "text") {
      const editBtn = document.createElement("button");
      editBtn.className = "msg-action edit";
      editBtn.type = "button";
      editBtn.textContent = "Modifier";
      editBtn.addEventListener("click", () => editOwnMessage(id));
      actions.appendChild(editBtn);
    }

    const deleteBtn = document.createElement("button");
    deleteBtn.className = "msg-action delete";
    deleteBtn.type = "button";
    deleteBtn.textContent = "Supprimer";
    deleteBtn.addEventListener("click", () => deleteOwnMessage(id));

    actions.appendChild(deleteBtn);
    meta.appendChild(actions);
  }

  const content = document.createElement("div");
  content.className = "msg-content";

  if (msg.msg_type === "file" && msg.file_id) {
    renderFileMessage(content, msg);
  } else {
    renderTextMessage(content, msg);
  }

  div.appendChild(meta);
  div.appendChild(content);

  container.appendChild(div);

  if (toBottom) {
    container.scrollTop = container.scrollHeight;
  }
}

function renderTextMessage(content, msg) {
  const bubble = document.createElement("div");
  bubble.className = "msg-bubble";
  bubble.innerHTML = safeMarkdown(msg.text || "");

  content.appendChild(bubble);

  if (shouldCollapseText(msg.text)) {
    bubble.classList.add("long-collapsed");

    const toggle = document.createElement("button");
    toggle.className = "toggle-long-btn";
    toggle.type = "button";
    toggle.textContent = "Afficher tout";

    toggle.addEventListener("click", () => {
      const collapsed = bubble.classList.toggle("long-collapsed");
      toggle.textContent = collapsed ? "Afficher tout" : "Réduire";
    });

    content.appendChild(toggle);
  }
}

function renderFileMessage(content, msg) {
  if (isImage(msg.file_name)) {
    const imgBox = document.createElement("div");
    imgBox.className = "img-bubble";

    const img = document.createElement("img");
    img.src = `/download/${encodeURIComponent(msg.file_id)}`;
    img.alt = msg.file_name || "image";
    img.loading = "lazy";

    imgBox.appendChild(img);

    imgBox.addEventListener("click", () => {
      openLightbox(`/download/${encodeURIComponent(msg.file_id)}`);
    });

    const link = document.createElement("a");
    link.href = `/download/${encodeURIComponent(msg.file_id)}`;
    link.download = msg.file_name || "fichier";
    link.style.fontFamily = "'DM Mono', monospace";
    link.style.fontSize = "11px";
    link.style.opacity = ".65";
    link.style.marginTop = "3px";
    link.style.color = "inherit";
    link.textContent = `⬇ ${msg.file_name || "image"} · ${formatSize(msg.file_size)}`;

    content.appendChild(imgBox);
    content.appendChild(link);
    return;
  }

  const link = document.createElement("a");
  link.className = "file-bubble";
  link.href = `/download/${encodeURIComponent(msg.file_id)}`;
  link.download = msg.file_name || "fichier";

  const icon = document.createElement("div");
  icon.className = "file-icon";
  icon.textContent = fileIcon(msg.file_name);

  const info = document.createElement("div");
  info.className = "file-info";

  const fileName = document.createElement("div");
  fileName.className = "file-name";
  fileName.textContent = msg.file_name || "fichier";

  const meta = document.createElement("div");
  meta.className = "file-meta";
  meta.textContent = `${formatSize(msg.file_size)} · Cliquer pour télécharger`;

  info.appendChild(fileName);
  info.appendChild(meta);

  link.appendChild(icon);
  link.appendChild(info);

  content.appendChild(link);
}

function renderSystem(text) {
  const container = document.getElementById("messages");

  const div = document.createElement("div");
  div.className = "msg-system";
  div.textContent = text;

  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

// ── MESSAGE ACTIONS ──
function editOwnMessage(id) {
  const msg = messageStore.get(String(id));

  if (!msg || msg.username !== myUsername || msg.msg_type !== "text") {
    return;
  }

  const next = prompt("Modifier votre message :", msg.text || "");

  if (next === null) {
    return;
  }

  if (!next.trim()) {
    alert("Le message ne peut pas être vide.");
    return;
  }

  socket.emit("edit_message", {
    id: Number(id),
    text: next
  });
}

function deleteOwnMessage(id) {
  const msg = messageStore.get(String(id));

  if (!msg || msg.username !== myUsername) {
    return;
  }

  const ok = confirm("Voulez-vous vraiment supprimer ce message ?");

  if (!ok) {
    return;
  }

  socket.emit("delete_message", {
    id: Number(id)
  });
}

function updateRenderedMessage(updatedMsg) {
  if (!updatedMsg || updatedMsg.id === undefined || updatedMsg.id === null) {
    return;
  }

  const id = String(updatedMsg.id);
  const oldMsg = messageStore.get(id) || {};
  const merged = { ...oldMsg, ...updatedMsg };

  messageStore.set(id, merged);

  const node = getMessageNode(id);

  if (!node) {
    renderMessage(merged);
    return;
  }

  const content = node.querySelector(".msg-content");

  if (content) {
    content.innerHTML = "";
    renderTextMessage(content, merged);
  }

  const meta = node.querySelector(".msg-meta");

  if (meta && !meta.querySelector(".msg-edited")) {
    const edited = document.createElement("span");
    edited.className = "msg-edited";
    edited.textContent = "modifié";

    const actions = meta.querySelector(".msg-actions");

    if (actions) {
      meta.insertBefore(edited, actions);
    } else {
      meta.appendChild(edited);
    }
  }
}

function removeRenderedMessage(id) {
  const key = String(id);
  const node = getMessageNode(key);

  messageStore.delete(key);

  if (node) {
    node.remove();
  }
}

// ── LIGHTBOX ──
function openLightbox(src) {
  const lb = document.getElementById("lightbox");
  document.getElementById("lightbox-img").src = src;
  lb.style.display = "flex";
}

document.getElementById("lightbox").addEventListener("click", () => {
  document.getElementById("lightbox").style.display = "none";
});

// ── USERS ──
function updateUsers(users) {
  document.getElementById("online-count").textContent = users.length;

  const strip = document.getElementById("users-strip");
  strip.innerHTML = "";

  users.forEach(name => {
    const [bg, fg] = getColor(name);

    const chip = document.createElement("div");
    chip.className = "user-chip";

    const av = document.createElement("div");
    av.className = "chip-av";
    av.style.background = bg;
    av.style.color = fg;
    av.textContent = (name || "?")[0].toUpperCase();

    const label = document.createElement("span");
    label.textContent = name === myUsername ? "Vous" : name;

    chip.appendChild(av);
    chip.appendChild(label);
    strip.appendChild(chip);
  });
}

// ── TYPING BAR ──
function updateTypingBar(users) {
  const bar = document.getElementById("typing-bar");
  const others = users.filter(u => u !== myUsername);

  if (!others.length) {
    bar.innerHTML = "";
    return;
  }

  const verb = others.length === 1 ? "écrit" : "écrivent";

  bar.innerHTML = `
    <div class="typing-dots">
      <span></span><span></span><span></span>
    </div>
    <span>${escHtml(others.join(", "))} ${verb}…</span>
  `;
}

// ── HISTORY ──
function resetMessagesContainer() {
  const container = document.getElementById("messages");

  messageStore.clear();

  container.innerHTML = `
    <div class="msg-system">
      👋 Bienvenue — messages persistants · Markdown · Fichiers · Sans limite de texte
    </div>
  `;
}

// ── SCROLLBAR visible seulement au scroll ou au hover ──
let scrollHideTimer = null;
const messagesScroller = document.getElementById("messages");

messagesScroller.addEventListener("scroll", () => {
  messagesScroller.classList.add("is-scrolling");

  clearTimeout(scrollHideTimer);

  scrollHideTimer = setTimeout(() => {
    messagesScroller.classList.remove("is-scrolling");
  }, 900);
});

// ── SOCKET EVENTS ──
socket.on("auth_error", data => {
  clearSession();

  myUsername = "";
  myPassword = "";

  const err = document.getElementById("auth-error");
  err.textContent = data.message;
  err.style.display = "block";

  document.getElementById("password-input").value = "";
  document.getElementById("password-input").style.borderColor = "var(--accent2)";
  document.getElementById("password-input").focus();

  document.getElementById("modal-overlay").classList.remove("hidden");
});

socket.on("history", data => {
  resetMessagesContainer();

  const container = document.getElementById("messages");

  if (data.messages && data.messages.length) {
    const sep = document.createElement("div");
    sep.className = "date-sep";
    sep.textContent = "— historique complet —";
    container.appendChild(sep);

    data.messages.forEach(m => renderMessage(m, false));
    container.scrollTop = container.scrollHeight;
  }
});

socket.on("message", msg => {
  renderMessage(msg);
});

socket.on("message_updated", data => {
  updateRenderedMessage(data.message);
});

socket.on("message_deleted", data => {
  removeRenderedMessage(data.id);
});

socket.on("message_error", data => {
  renderSystem("❌ " + (data.message || "Erreur."));
});

socket.on("user_joined", data => {
  if (data.users.includes(myUsername)) {
    saveSession(myUsername, myPassword);

    document.getElementById("my-name-label").textContent = myUsername;
    document.getElementById("modal-overlay").classList.add("hidden");
    document.getElementById("msg-input").focus();
  }

  updateUsers(data.users);
  renderSystem(`✦ ${data.username} a rejoint le groupe`);
});

socket.on("user_left", data => {
  updateUsers(data.users);
  renderSystem(`✦ ${data.username} a quitté le groupe`);
});

socket.on("typing_update", data => {
  updateTypingBar(data.users);
});
</script>

</body>
</html>
